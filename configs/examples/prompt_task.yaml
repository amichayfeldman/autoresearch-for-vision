defaults:
  - /prompt_task@_global_
  - _self_

# Run one execution:
# python run_training.py --config-name examples/prompt_task --task-prompt-file task.md
#
# Run managed iterations:
# python manage_iterations.py --config-name examples/prompt_task --task-prompt "Detect surface defects in microscope images" --model-path model.pt
#
# The first agent call is a wiring phase, not an evaluation phase. It modifies
# task-specific code so the manager can verify precision and recall before any
# training starts.
