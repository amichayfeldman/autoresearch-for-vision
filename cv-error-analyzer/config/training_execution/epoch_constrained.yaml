# @package training_execution
# Training execution with epoch constraints

# Epoch scheduling
base_epochs: 50
max_epochs_per_iteration: 100
adaptive_factor: 1.2
min_epochs: 20

# Early stopping
early_stopping_patience: 10
early_stopping_min_delta: 0.001
early_stopping_enabled: true

# Training profiles
profiles:
  fast:
    base_epochs: 30
    max_epochs_per_iteration: 50
    early_stopping_patience: 5
  
  standard:
    base_epochs: 50  
    max_epochs_per_iteration: 100
    early_stopping_patience: 10
    
  thorough:
    base_epochs: 100
    max_epochs_per_iteration: 200
    early_stopping_patience: 15

# Default profile
active_profile: "standard"

# Training timeout (seconds)
training_timeout: 7200

# Resource constraints
max_concurrent_trainings: 1
gpu_memory_limit: "8GB"