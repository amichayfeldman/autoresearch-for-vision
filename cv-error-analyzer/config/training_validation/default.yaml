# @package training_validation
# Training validation configuration

# Validation metrics
validation_metric: "loss"  # Options: loss, mAP, precision, recall, f1
improvement_threshold: 0.05
confidence_threshold: 0.8

# Metric tracking
tracked_metrics:
  - "train/box_loss"
  - "train/pose_loss"
  - "val/box_loss" 
  - "val/pose_loss"
  - "metrics/mAP50"
  - "metrics/mAP50-95"
  - "metrics/precision"
  - "metrics/recall"

# Baseline comparison
baseline_source: "original_experiment"  # Options: original_experiment, previous_iteration
comparison_window: 5  # Number of recent iterations to compare

# Validation criteria
validation_criteria:
  min_epochs: 10
  min_improvement: 0.01
  stability_threshold: 0.05
  
# ClearML integration
clearml:
  project_name: "YOLO-Pose"
  track_validation_metrics: true