# @package analysis_level
# Basic level analysis configuration

start_level: 1
max_level: 1
current_level_name: "basic"

# Basic level specific parameters
max_iterations: 10
saturation_threshold: 0.01
improvement_threshold: 0.05

# Error analysis parameters  
error_percentile: 75  # Configurable percentile for error ranking (50-95)
percentile_threshold: 75  # Deprecated, use error_percentile
min_samples_per_iteration: 50

# Augmentation configuration
augmentation:
  semantic_only: true
  color_jitter:
    brightness: 0.1
    contrast: 0.1
    saturation: 0.1
    hue: 0.05
    p: 1.0

# Recommendation generation
recommendation_confidence_threshold: 0.6
max_recommendations: 5