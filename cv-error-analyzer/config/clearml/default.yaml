# @package clearml
# ClearML integration configuration

# Dataset configuration
dataset_project: "yolo_pose_manual_annotations_dataset"
dataset_name: "yolo_pose_manual_annotations_dataset"

# Experiment tracking
experiment_project: "CV-Error-Analyzer"
track_experiments: true
auto_tag_experiments: true

# Task configuration
task_tags:
  - "automated"
  - "error-analysis"
  - "cv-analyzer"

# Model storage
store_models: true
model_upload: true
model_name_template: "cv_analyzer_iteration_{iteration}"

# Metrics logging
log_metrics: true
log_hyperparameters: true
log_artifacts: true

# Connection settings
timeout: 300
retry_attempts: 3